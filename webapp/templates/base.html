<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title or "Sleeper League" }}</title>
	<link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
</head>
<body>
	<header class="top-bar">
		<div class="brand">
			<div class="brand__title">Sleeper League</div>
			<div class="brand__meta">League ID: {{ info.league_id if info else "" }}</div>
		</div>
		<nav class="nav">
			<a href="/">Dashboard</a>
			<a href="/rosters">Rosters</a>
			<a href="/draft">Draft</a>
			<a href="/players">Players</a>
		</nav>
	</header>
	<main class="container">
		{% block content %}{% endblock %}
	</main>
</body>
</html>
